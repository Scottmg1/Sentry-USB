name: Build & Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Copy frontend into server/static
        run: |
          mkdir -p server/static
          rm -rf server/static/*
          cp -r web/dist/* server/static/
          echo "Static files:"
          ls -la server/static/

      - name: Build binaries
        working-directory: server
        run: |
          ls -la static/
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o bin/sentryusb-linux-arm64 .
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "-s -w" -o bin/sentryusb-linux-armv7 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentryusb-binaries
          path: |
            server/bin/sentryusb-linux-arm64
            server/bin/sentryusb-linux-armv7

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server/bin/sentryusb-linux-arm64
            server/bin/sentryusb-linux-armv7
