name: Build SentryUSB Image

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - arm64
          - armhf
  release:
    types: [published]

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build server binaries
        working-directory: server
        run: |
          make copy-static
          GOOS=linux GOARCH=arm64 go build -o bin/sentryusb-linux-arm64 .
          GOOS=linux GOARCH=arm GOARM=7 go build -o bin/sentryusb-linux-armv7 .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sentryusb-binaries
          path: |
            server/bin/sentryusb-linux-arm64
            server/bin/sentryusb-linux-armv7

  build-image-arm64:
    needs: build-binaries
    if: ${{ github.event_name == 'release' || github.event.inputs.arch == 'both' || github.event.inputs.arch == 'arm64' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU for ARM emulation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: sentryusb-binaries
          path: /tmp/bin/

      - name: Debug - list downloaded files
        run: find /tmp/bin -type f

      - name: Clone pi-gen (arm64 branch)
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Prepare and build arm64 image
        working-directory: /tmp/pi-gen
        run: |
          bash "$GITHUB_WORKSPACE/pi-gen-sources/prepare.sh"
          cp "$GITHUB_WORKSPACE/pi-gen-sources/pi-gen-config" config
          cp /tmp/bin/sentryusb-linux-arm64 stage_sentryusb/00-sentryusb-tweaks/files/sentryusb-binary
          chmod +x stage_sentryusb/00-sentryusb-tweaks/files/sentryusb-binary

          # Fix: Debian rotated archive signing keys; the keyring baked into
          # debootstrap AND the pi-gen Docker base image are both stale.
          # Download the current debian-archive-keyring .deb directly from
          # Debian's pool on this runner, then have the stage script copy it
          # into the rootfs via the /pi-gen volume mount (no keyserver needed).
          mkdir -p stage0/00-aaa-fix-keys/files
          PKG=$(curl -fsSL "https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/" \
                | grep -oP 'debian-archive-keyring_[^"]+_all\.deb' | sort -V | tail -1)
          curl -fsSL "https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/${PKG}" \
                -o /tmp/keyring.deb
          dpkg -x /tmp/keyring.deb /tmp/keyring-extracted
          cp /tmp/keyring-extracted/usr/share/keyrings/debian-archive-keyring.gpg \
                stage0/00-aaa-fix-keys/files/
          printf '#!/bin/bash -e\ncp /pi-gen/stage0/00-aaa-fix-keys/files/debian-archive-keyring.gpg "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.gpg"\ncp /pi-gen/stage0/00-aaa-fix-keys/files/debian-archive-keyring.gpg "${ROOTFS_DIR}/etc/apt/trusted.gpg.d/debian-archive-bookworm.gpg"\n' > stage0/00-aaa-fix-keys/00-run.sh
          chmod +x stage0/00-aaa-fix-keys/00-run.sh

          ./build-docker.sh

      - name: Compress image
        id: compress
        run: |
          IMAGE=$(find /tmp/pi-gen/deploy -name '*.img' | head -1)
          gzip -9 "$IMAGE"
          echo "path=${IMAGE}.gz" >> $GITHUB_OUTPUT
          echo "name=sentryusb-arm64-$(date +%Y%m%d).img.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentryusb-image-arm64
          path: ${{ steps.compress.outputs.path }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.compress.outputs.path }}

  build-image-armhf:
    needs: build-binaries
    if: ${{ github.event_name == 'release' || github.event.inputs.arch == 'both' || github.event.inputs.arch == 'armhf' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU for ARM emulation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: sentryusb-binaries
          path: /tmp/bin/

      - name: Debug - list downloaded files
        run: find /tmp/bin -type f

      - name: Clone pi-gen (master branch for 32-bit)
        run: git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Prepare and build armhf (32-bit) image
        working-directory: /tmp/pi-gen
        run: |
          bash "$GITHUB_WORKSPACE/pi-gen-sources/prepare.sh"
          cp "$GITHUB_WORKSPACE/pi-gen-sources/pi-gen-config-32bit" config
          cp /tmp/bin/sentryusb-linux-armv7 stage_sentryusb/00-sentryusb-tweaks/files/sentryusb-binary
          chmod +x stage_sentryusb/00-sentryusb-tweaks/files/sentryusb-binary

          # Fix: Debian rotated archive signing keys; the keyring baked into
          # debootstrap AND the pi-gen Docker base image are both stale.
          # Download the current debian-archive-keyring .deb directly from
          # Debian's pool on this runner, then have the stage script copy it
          # into the rootfs via the /pi-gen volume mount (no keyserver needed).
          mkdir -p stage0/00-aaa-fix-keys/files
          PKG=$(curl -fsSL "https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/" \
                | grep -oP 'debian-archive-keyring_[^"]+_all\.deb' | sort -V | tail -1)
          curl -fsSL "https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/${PKG}" \
                -o /tmp/keyring.deb
          dpkg -x /tmp/keyring.deb /tmp/keyring-extracted
          cp /tmp/keyring-extracted/usr/share/keyrings/debian-archive-keyring.gpg \
                stage0/00-aaa-fix-keys/files/
          printf '#!/bin/bash -e\ncp /pi-gen/stage0/00-aaa-fix-keys/files/debian-archive-keyring.gpg "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.gpg"\ncp /pi-gen/stage0/00-aaa-fix-keys/files/debian-archive-keyring.gpg "${ROOTFS_DIR}/etc/apt/trusted.gpg.d/debian-archive-bookworm.gpg"\n' > stage0/00-aaa-fix-keys/00-run.sh
          chmod +x stage0/00-aaa-fix-keys/00-run.sh

          ./build-docker.sh

      - name: Compress image
        id: compress
        run: |
          IMAGE=$(find /tmp/pi-gen/deploy -name '*.img' | head -1)
          gzip -9 "$IMAGE"
          echo "path=${IMAGE}.gz" >> $GITHUB_OUTPUT
          echo "name=sentryusb-armhf-$(date +%Y%m%d).img.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentryusb-image-armhf
          path: ${{ steps.compress.outputs.path }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.compress.outputs.path }}
